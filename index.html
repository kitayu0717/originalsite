<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>キタユオリジナルサイト</title>


<link rel="manifest" href="manifest.json">


<style>

body{
font-family:sans-serif;
margin:20px;
}


.gallery{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:15px;

}


.card{

border:1px solid #ddd;

padding:10px;

text-align:center;

}


.card img{

width:100%;

height:150px;

object-fit:cover;

}


button{

font-size:18px;

padding:10px 20px;

}



.modal{

display:none;

position:fixed;

inset:0;

background:
rgba(0,0,0,.7);

align-items:center;

justify-content:center;

}


.quiz{

background:white;

width:90%;

max-width:500px;

padding:20px;

border-radius:10px;

text-align:center;

}


.quiz img{

width:100%;

height:300px;

object-fit:contain;

}



</style>

</head>


<body>


<h1>画像一覧</h1>


<div id="gallery"
class="gallery"></div>


<br>


<button onclick="startQuiz()">
クイズ
</button>



<div id="modal"
class="modal">


<div class="quiz">


<h2 id="title"></h2>


<img id="quizImg">


<p id="count"></p>


<button onclick="next()">
▶
</button>


<br><br>


<button onclick="closeQuiz()">
閉じる
</button>


</div>


</div>



<script>


const images=[

{
title:"犬",
src:"images/dog.jpg"
},

{
title:"猫",
src:"images/cat.jpg"
},

{
title:"車",
src:"images/car.jpg"
}

];



// 一覧表示

const gallery=
document.querySelector("#gallery");


images.slice(0,10)
.forEach(x=>{


gallery.innerHTML+=`

<div class="card">

<img src="${x.src}">

<p>${x.title}</p>

</div>

`;

});





let quiz=[];

let now=0;



function startQuiz(){


quiz=[...images];

quiz.sort(
()=>Math.random()-0.5
);


now=0;


modal.style.display="flex";


show();


}



function show(){


if(now>=quiz.length){

title.innerHTML="終了";

quizImg.src="";

count.innerHTML="";

return;

}



title.innerHTML=
quiz[now].title;


quizImg.src=
quiz[now].src;


count.innerHTML=
`${now+1}/${quiz.length}`;


}




function next(){

now++;

show();

}




function closeQuiz(){

modal.style.display="none";

}




// スワイプ

let startX;


document.addEventListener(
"touchstart",
e=>{

startX=e.touches[0].clientX;

});


document.addEventListener(
"touchend",
e=>{

let endX=
e.changedTouches[0].clientX;


if(startX-endX>50){

next();

}

});




// PWA登録

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}


</script>


</body>

</html>
